version: "2"
run:
  concurrency: 16
linters:
  default: all
  disable:
    - wsl
    - wsl_v5
    - dupl
    - containedctx
    - cyclop
    - exhaustruct
    - funlen
    - gochecknoglobals
    - gosmopolitan
    - ireturn
    - lll
    - mnd
    - nonamedreturns
    - tagalign
    - varnamelen
  settings:
    depguard:
      rules:
        config:
          list-mode: lax
          files:
            - "**/internal/config/**/*.go"
          deny:
            - pkg: "github.com/djalben/xplr-core"
        domain:
          list-mode: lax
          files:
            - "**/internal/domain/**/*.go"
          deny:
            - pkg: "github.com/djalben/xplr-core/internal/..."
        ports:
          list-mode: lax
          files:
            - "**/internal/ports/**/*.go"
          deny:
            - pkg: "github.com/djalben/xplr-core/internal/application"
            - pkg: "github.com/djalben/xplr-core/internal/infrastructure"
            - pkg: "github.com/djalben/xplr-core/internal/transport"
        application:
          list-mode: lax
          files:
            - "**/internal/application/**/*.go"
          deny:
            - pkg: "github.com/djalben/xplr-core/internal/infrastructure"
            - pkg: "github.com/djalben/xplr-core/internal/transport"
            - pkg: "github.com/djalben/xplr-core/internal/config"
        infrastructure:
          list-mode: lax
          files:
            - "**/internal/infrastructure/**/*.go"
          deny:
            - pkg: "github.com/djalben/xplr-core/internal/application"
            - pkg: "github.com/djalben/xplr-core/internal/transport"
        transport:
          list-mode: lax
          files:
            - "**/internal/transport/**/*.go"
          deny:
            - pkg: "github.com/djalben/xplr-core/internal/config"
            - pkg: "github.com/djalben/xplr-core/internal/infrastructure"
    # Строковый ключ userID в контексте согласован с middleware; typed key — отдельный рефакторинг.
    staticcheck:
      checks:
        - all
        - '-SA1029'
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
    rules:
      - path: _test\.go$
        linters:
          - err113
      # SUT против одной БД — параллель ломает TRUNCATE.
      - path: internal/infrastructure/persistence/postgres/.*_test\.go$
        linters:
          - paralleltest
      # BFF: контракт JSON для фронта в snake_case.
      - path: internal/transport/http/handler/v1/user/handler\.go$
        linters:
          - tagliatelle
      # Имена интерфейсов для gomock осознанно с префиксом пакета.
      - path: internal/transport/http/handler/v1/.*/contracts\.go$
        linters:
          - revive
      - path: internal/transport/http/middleware/auth\.go$
        text: context-keys-type
        linters:
          - revive
      - path: internal/transport/http/handler/v1/.*/.*_test\.go$
        text: context-keys-type
        linters:
          - revive
      - path: internal/application/.*\.go$
        linters:
          - wrapcheck
      - path: internal/app/.*\.go$
        linters:
          - wrapcheck

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$